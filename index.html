<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LogiMed 2026 — Locus Intelligence Console</title>
<style>
  :root {
    --bg: #0A0E1A;
    --card: #111827;
    --card-hover: #1a2235;
    --border: #1e293b;
    --text: #e2e8f0;
    --text-dim: #94a3b8;
    --purple: #6A3D99;
    --purple-light: #EEDFFF;
    --green: #00D173;
    --blue: #14B5F0;
    --red: #CC0000;
    --orange: #FF8C00;
    --dark-purple: #2D003C;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }
  .header {
    background: linear-gradient(135deg, var(--dark-purple) 0%, #1a0a2e 50%, var(--bg) 100%);
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.3px;
  }
  .header h1 span { color: var(--green); }
  .header-meta {
    font-size: 12px;
    color: var(--text-dim);
    text-align: right;
  }
  .nav {
    display: flex;
    gap: 0;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
  }
  .nav button {
    background: none;
    border: none;
    color: var(--text-dim);
    padding: 12px 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .nav button.active {
    color: var(--green);
    border-bottom-color: var(--green);
  }
  .nav button:hover { color: var(--text); }
  .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; }

  /* Search */
  .search-box {
    position: relative;
    margin-bottom: 24px;
  }
  .search-box input {
    width: 100%;
    padding: 14px 20px 14px 44px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-box input:focus { border-color: var(--purple); }
  .search-box input::placeholder { color: var(--text-dim); }
  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 16px;
  }

  /* Cards */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .card:hover {
    background: var(--card-hover);
    border-color: var(--purple);
    transform: translateY(-1px);
  }
  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }
  .card-company {
    font-size: 16px;
    font-weight: 600;
    color: #fff;
  }
  .card-score {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .score-hot { background: rgba(0, 209, 115, 0.15); color: var(--green); }
  .score-warm { background: rgba(255, 140, 0, 0.15); color: var(--orange); }
  .score-cool { background: rgba(148, 163, 184, 0.15); color: var(--text-dim); }
  .card-meta {
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 10px;
  }
  .tag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 4px;
    font-weight: 500;
  }
  .tag-lmd { background: rgba(20, 181, 240, 0.15); color: var(--blue); }
  .tag-tms { background: rgba(106, 61, 153, 0.2); color: var(--purple-light); }
  .tag-roundtable { background: rgba(204, 0, 0, 0.15); color: #ff4444; }
  .tag-2pager { background: rgba(0, 209, 115, 0.15); color: var(--green); }

  /* Detail Panel */
  .detail-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    display: none;
    justify-content: flex-end;
  }
  .detail-overlay.open { display: flex; }
  .detail-panel {
    width: min(680px, 90vw);
    background: var(--bg);
    border-left: 1px solid var(--border);
    height: 100vh;
    overflow-y: auto;
    padding: 32px;
    animation: slideIn 0.2s ease-out;
  }
  @keyframes slideIn {
    from { transform: translateX(40px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }
  .detail-panel h2 {
    font-size: 22px;
    font-weight: 700;
    color: #fff;
    margin-bottom: 4px;
  }
  .detail-section {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .detail-section h3 {
    font-size: 13px;
    font-weight: 600;
    color: var(--green);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .detail-section p, .detail-section li {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
  }
  .detail-section ul { padding-left: 18px; }
  .detail-section li { margin-bottom: 4px; }
  .close-btn {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .close-btn:hover { background: var(--card-hover); }

  .kv-row {
    display: flex;
    gap: 8px;
    margin-bottom: 6px;
    font-size: 13px;
  }
  .kv-label {
    color: var(--text-dim);
    min-width: 140px;
    flex-shrink: 0;
    font-weight: 500;
  }
  .kv-value { color: var(--text); }
  .kv-value.highlight { color: var(--green); font-weight: 600; }

  /* Attendee cards */
  .attendee-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 14px;
    background: var(--card);
    border-radius: 8px;
    margin-bottom: 6px;
    border: 1px solid var(--border);
  }
  .attendee-name { font-weight: 600; font-size: 14px; color: #fff; }
  .attendee-title { font-size: 12px; color: var(--text-dim); }

  /* Roundtable tab */
  .rt-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 16px;
  }
  .rt-card h3 { color: #fff; font-size: 16px; margin-bottom: 2px; }
  .rt-card .rt-title { color: var(--text-dim); font-size: 13px; margin-bottom: 8px; }
  .rt-card .rt-company { color: var(--blue); font-size: 13px; font-weight: 500; }
  .rt-opener {
    background: rgba(106, 61, 153, 0.1);
    border: 1px solid rgba(106, 61, 153, 0.3);
    border-radius: 8px;
    padding: 12px;
    margin-top: 12px;
    font-size: 13px;
    font-style: italic;
    color: var(--purple-light);
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    gap: 16px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .stat-chip {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .stat-chip strong {
    color: #fff;
    font-size: 18px;
    display: block;
    margin-bottom: 2px;
  }

  /* Filter chips */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .filter-chip {
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-chip.active {
    border-color: var(--green);
    color: var(--green);
    background: rgba(0, 209, 115, 0.1);
  }
  .filter-chip:hover { border-color: var(--text-dim); }

  .two-pager-text {
    white-space: pre-wrap;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
  }

  .hidden { display: none; }

  /* Responsive — Mobile & iPad */
  @media (max-width: 768px) {
    .header { padding: 14px 16px; flex-direction: column; gap: 6px; align-items: flex-start; }
    .header h1 { font-size: 17px; }
    .header-meta { text-align: left; font-size: 11px; }
    .nav { padding: 0 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; flex-wrap: nowrap; }
    .nav button { padding: 10px 12px; font-size: 12px; white-space: nowrap; flex-shrink: 0; }
    .container { padding: 16px 12px; }
    .card-grid { grid-template-columns: 1fr; gap: 12px; }
    .card { padding: 16px; }
    .search-box input { font-size: 16px; padding: 12px 16px 12px 40px; }
    .stats-bar { gap: 8px; }
    .stat-chip { padding: 8px 12px; flex: 1; min-width: 80px; }
    .stat-chip strong { font-size: 16px; }
    .filters { gap: 6px; }
    .filter-chip { font-size: 11px; padding: 4px 10px; }
    .detail-panel { width: 100vw; padding: 20px 16px; }
    .kv-row { flex-direction: column; gap: 2px; }
    .kv-label { min-width: unset; }
    .rt-card { padding: 16px; }
    .rt-opener { font-size: 12px; padding: 10px; }
    .research-content table { display: block; overflow-x: auto; font-size: 12px; }
    .research-content th, .research-content td { padding: 6px 8px; }
    .locus-pitch-box { padding: 14px; }
  }
  @media (min-width: 769px) and (max-width: 1024px) {
    .header { padding: 16px 20px; }
    .nav { padding: 0 16px; }
    .container { padding: 20px 20px; }
    .card-grid { grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
    .detail-panel { width: min(580px, 85vw); }
  }

  /* Research tab */
  .research-content {
    font-size: 14px;
    line-height: 1.7;
  }
  .research-content h2 {
    font-size: 18px;
    color: var(--green);
    margin: 28px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .research-content h3 {
    font-size: 15px;
    color: var(--blue);
    margin: 20px 0 8px;
  }
  .research-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }
  .research-content th, .research-content td {
    padding: 8px 12px;
    border: 1px solid var(--border);
    text-align: left;
  }
  .research-content th {
    background: var(--card);
    color: var(--green);
    font-weight: 600;
  }
  .locus-pitch-box {
    background: linear-gradient(135deg, rgba(45, 0, 60, 0.4), rgba(106, 61, 153, 0.2));
    border: 1px solid var(--purple);
    border-radius: 12px;
    padding: 20px;
    margin: 16px 0;
  }
  .locus-pitch-box h3 { color: var(--purple-light); }
</style>
</head>

</div>

<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">

    <button class="close-btn" onclick="closeDetail()">&times;</button>
    <div id="detail-content"></div>
  </div>
</div>

  twoPagers = {"Medtronic": "MEDTRONIC\nMedTech  |  Revenue: ~$32B  |  Locus Score: 94/100  |  Rank #1\nSUPPLY CHAIN CONTEXT\nMedtronic manages one of the most complex medical device supply chains globally, with products ranging from implantable cardiac devices to insulin pumps requiring cold chain. The company has been recognized for supply chain optimization excellence. They operate a global logistics network spanning 150+ countries with field inventory management for surgical cases requiring just-in-time delivery to operating rooms.\nKEY PAIN POINTS\nField inventory management across 150+ countries with case-by-case surgical delivery\nCold chain integrity for biologics and temperature-sensitive insulin products\nLast-mile coordination for time-critical surgical case delivery to hospitals\nVisibility gaps between distribution centers and final delivery point\nLOCUS VALUE PROPOSITION\nRoute optimization for hospital delivery networks \u2014 reduce delivery cost by 15-20% across thousands of daily shipments\nReal-time visibility and electronic proof of delivery for surgical case logistics\nCold chain monitoring integration at delivery touchpoint \u2014 temperature event logging with GPS and timestamps\nAI-powered dispatch for field service engineers managing device installations and maintenance\nKEY TALKING POINTS FOR THE MEETING\nMedtronic spent $X billion on logistics (est. 5-6% of $32B revenue = $1.6-1.9B) \u2014 even 10% optimization = $160-190M savings potential\nDSCSA compliance gap: Medtronic needs delivery-level chain-of-custody events that close the compliance loop\nLocus integrates with SAP/Oracle \u2014 no rip-and-replace of existing TMS infrastructure\nReference: Locus manages 350+ deployments across 30 countries \u2014 healthcare-validated at enterprise scale", "Abbott": "ABBOTT\nHealthcare (MedTech + Pharma)  |  Revenue: ~$40B  |  Locus Score: 90/100  |  Rank #2\nSUPPLY CHAIN CONTEXT\nAbbott works with 75,000+ suppliers across 120 countries. Medical Devices is their largest segment at $19B. Their 2030 Sustainability Plan focuses on strengthening supply chain operations. Abbott's products span high-value surgical devices (requiring time-critical hospital delivery) to high-volume nutritional products (requiring efficient route density).\nKEY PAIN POINTS\nMassive supplier network (75,000+) creating inbound and outbound logistics complexity\nDual distribution model: high-value/low-volume devices + high-volume nutritional products\nTemperature-sensitive diagnostics requiring cold chain integrity\nLast-mile delivery optimization for diverse product categories with different SLA requirements\nLOCUS VALUE PROPOSITION\nMulti-modal route optimization \u2014 different algorithms for surgical device urgency vs. nutritional product density\nElectronic proof of delivery with temperature logging for diagnostic products\nFleet optimization across diverse delivery profiles \u2014 consolidate routes across business units\nReal-time dispatch and dynamic re-routing for time-critical hospital deliveries\nKEY TALKING POINTS FOR THE MEETING\nAbbott's logistics spend is est. $2-2.4B (6% of $40B) \u2014 optimization ROI is massive\nExpressed interest in Last Mile Delivery at LogiMed \u2014 active buying signal\nLocus can handle the complexity of multiple product categories with different delivery SLAs in a single platform\nAbbott's 2030 Sustainability Plan aligns with Locus's fuel reduction capabilities (15-20% reduction proven)", "Medline Industries": "MEDLINE INDUSTRIES\nHealthcare Distribution  |  Revenue: ~$21B  |  Locus Score: 86/100  |  Rank #3\nSUPPLY CHAIN CONTEXT\nMedline operates 69 global distribution centers with 2,000+ owned trucks, achieving 95% next-day delivery and 99% service levels. They are launching Mpower \u2014 an AI-powered supply chain control tower built on Microsoft Azure, collaborating with Northwestern Medicine and Providence. 20 AutoStore robotic installations across 17 facilities with 1,800+ robots.\nKEY PAIN POINTS\nOptimizing routes for 2,000+ truck owned fleet across 69 DCs\nMaintaining 95% next-day delivery standard while controlling costs\nIntegrating AI control tower (Mpower) with last-mile execution layer\nIPO preparation ($6.3B filing) driving need for operational efficiency metrics\nLOCUS VALUE PROPOSITION\nFleet route optimization for 2,000+ trucks \u2014 Locus can deliver 15-20% fuel savings = $30-40M annually\nAI-native execution layer that complements Mpower control tower \u2014 Locus handles the 'last mile' that Mpower plans\nReal-time dynamic dispatch and route adjustments for daily hospital deliveries\nEnterprise-grade analytics dashboard showing delivery performance, SLA compliance, and cost metrics\nKEY TALKING POINTS FOR THE MEETING\nMedline's logistics spend est. $1.2-1.5B \u2014 route optimization alone could save $150-200M over 3 years\nBoth LMD and TMS interest flagged \u2014 strong dual buying signal\nMpower (their Azure AI control tower) needs an execution layer \u2014 Locus is the natural fit\nIPO-bound companies need demonstrable operational efficiency metrics \u2014 Locus provides exactly this", "BD Becton Dickinson": "BD (BECTON DICKINSON)\nMedTech  |  Revenue: ~$20B  |  Locus Score: 86/100  |  Rank #4\nSUPPLY CHAIN CONTEXT\nBD achieved the first-ever diamond-level HIRC supply chain resiliency badge across all 7 domains in August 2025. They've deployed Kinaxis RapidResponse for digital transformation, harmonizing multiple SAP and Oracle ERP systems. BD's 720,000 sq ft hyper-sustainable DC achieved 9% improvement in 2-day service times.\nKEY PAIN POINTS\nMaintaining diamond-level supply chain resiliency while optimizing cost\nIntegrating multiple SAP and Oracle ERP systems into unified supply chain visibility\nCold chain logistics for temperature-sensitive diagnostics\nLast-mile delivery optimization for hospital and lab customers\nLOCUS VALUE PROPOSITION\nAPI-first integration with both SAP and Oracle \u2014 complement Kinaxis planning with st \u2014 strong buying signal from multiple stakeholders\nSTERIS's service model (equipment + on-site service) is a perfect fit for Locus's dispatch + route optimization\nLogistics spend est. $300-400M \u2014 optimization ROI is significant and fast-payback", "Zimmer Biomet": "ZIMMER BIOMET\nMedTech  |  Revenue: ~$7B  |  Locus Score: 83/100  |  Rank #6\nSUPPLY CHAIN CONTEXT\nZimmer Biomet ($7.7B revenue, FY2024) manages highly complex surgical logistics \u2014 instrument kits must arrive at hospitals before scheduled surgeries. They use JAGGAER for procurement, run on SAP, and recently experienced ERP implementation challenges. 50+ new product launches planned in next 36 months. They successfully mitigated tariff headwinds from $60-80M to $40M through supply chain diversification.\nKEY PAIN POINTS\nSurgical instrument kit logistics \u2014 kits must arrive before scheduled OR time, then be returned for sterilization\nERP implementation challenges impacting supply chain visibility\n50+ new product launches increasing SKU complexity\nTariff exposure requiring supply chain diversification and cost optimization\nLOCUS VALUE PROPOSITION\nSurgical case logistics optimization \u2014 ensure instrument kits arrive on-time with AI-powered routing\nReverse logistics routing for kit return and sterilization cycle management\nIntegration with SAP and JAGGAER \u2014 Locus as the execution layer above existing infrastructure\nDynamic dispatch for emergency surgical cases \u2014 real-time re-routing when surgery schedules change\nKEY TALKING POINTS FOR THE MEETING\n7 attendees \u2014 largest delegation at LogiMed, signals major supply chain transformation initiative\nBoth LMD and TMS interest \u2014 validated buying intent\nOrthopedic kit logistics is uniquely complex (forward + reverse) \u2014 Locus handles both\nLogistics spend est. $400-500M \u2014 surgical case optimization alone could save $40-60M", "Cook Medical": "COOK MEDICAL\nHealthcare (MedTech)  |  Revenue: ~$2B (est.)  |  Locus Score: 83/100  |  Rank #7\nSUPPLY CHAIN CONTEXT\nCook Medical is one of the largest privately-held medical device companies. As a private company, they have unique flexibility in making technology investments without quarterly earnings pressure. Their interventional products (catheters, stents, access devices) require precise hospital delivery coordination for scheduled procedures.\nKEY PAIN POINTS\nField inventory management for interventional devices stored at hospital consignment locations\nCoordinating delivery of procedure-specific devices to match surgical schedules\nPrivate company seeking competitive edge through operational efficiency\nMulti-site delivery routing across hundreds of hospital customers\nLOCUS VALUE PROPOSITION\nRoute optimization for hospital delivery network \u2014 daily deliveries to procedure suites\nConsignment inventory management with delivery confirmation and automated replenishment triggers\nAI dispatch for emergency case delivery \u2014 interventional procedures often unplanned\nElectronic proof of delivery with timestamp for regulatory traceability\nKEY TALKING POINTS FOR THE MEETING\n6 attendees + C-Suite + both LMD/TMS interest = very high buying probability\nPrivate company = faster decision-making, no quarterly earnings distraction\nCook's interventional focus means delivery timing is clinical-critical \u2014 Locus's real-time dispatch is a differentiator\nLogistics spend est. $120-150M \u2014 optimization ROI at 15% = $18-22M", "Edwards Lifesciences": "EDWARDS LIFESCIENCES\nMedTech  |  Revenue: ~$6B  |  Locus Score: 83/100  |  Rank #8\nSUPPLY CHAIN CONTEXT\nEdwards Lifesciences ($6B) specializes in structural heart disease and critical care. Their products include transcatheter aortic valve replacement (TAVR) systems \u2014 among the highest-value medical devices requiring precise surgical case delivery. They have a dedicated Global Supply Chain Transportation and Logistics team managing carriers, 3PL warehouses, and t ions offering to more health system clients\nManaging 28% unoptimized spend (Gartner: health systems manage only 72% of spend centrally)\nLOCUS VALUE PROPOSITION\nMulti-node route optimization across Mayo's three major campuses and satellite clinics\nWhite-label potential: Locus could power Mayo's Supply Chain Solutions offering to other health systems\nAI-powered analytics for freight spend optimization \u2014 extend the 25% savings Mayo achieved to last-mile\nReal-time delivery visibility across the entire Mayo network\nKEY TALKING POINTS FOR THE MEETING\nMayo is both a buyer AND a potential channel partner \u2014 their Supply Chain Solutions serves other hospitals\nGartner Masters = they understand supply chain excellence better than anyone \u2014 lead with ROI data\nMayo reduced freight costs 25% by taking control of inbound \u2014 Locus can deliver similar results for last-mile\nPartnership model: Locus powering Mayo's SCS platform could reach hundreds of hospitals", "Endeavor Health": "ENDEAVOR HEALTH\nHealthcare Provider  |  Revenue: ~$6-7B (est.)  |  Locus Score: 78/100  |  Rank #10\nSUPPLY CHAIN CONTEXT\nEndeavor Health was formed from the 2022 merger of NorthShore University HealthSystem and Edward-Elmhurst Health. Post-merger integration creates significant supply chain optimization opportunities as they consolidate distribution networks across multiple hospital campuses in the Chicago metropolitan area.\nKEY PAIN POINTS\nPost-merger supply chain integration \u2014 consolidating two separate distribution networks\nMulti-campus delivery routing across Chicagoland hospitals\nStandardizing logistics technology across previously separate health systems\nCost optimization pressure in a competitive Chicago healthcare market\nLOCUS VALUE PROPOSITION\nPost-merger route optimization \u2014 consolidate delivery networks from two health systems into optimized routes\nMulti-node delivery planning across 8+ hospital campuses and satellite clinics\nQuick implementation y failure = $400K+ loss + patient harm\nLocus's cold chain capabilities are a perfect match for BioMarin's product requirements\nDSCSA enforcement is now live \u2014 BioMarin needs delivery-level compliance data", "HonorHealth": "HONORHEALTH\nHealthcare Provider  |  Revenue: ~$3-4B  |  Locus Score: 75/100  |  Rank #12\nSUPPLY CHAIN CONTEXT\nHonorHealth operates multiple hospitals and medical centers across the Phoenix metropolitan area. As a growing regional health system, they are looking to optimize logistics across their network of hospitals, clinics, and outpatient facilities.\nKEY PAIN POINTS\nMulti-site logistics across Phoenix metro area hospitals and clinics\nGrowing network creating delivery route complexity\nNeed for real-time visibility into supply deliveries\nCost pressure on logistics operations\nLOCUS VALUE PROPOSITION\nRoute optimization for multi-campus hospital delivery network in Phoenix metro\nReal-time delivery tracking and electronic proof of delivery for supply chain visibility\nAI-powered dispatch for consolidating deliveries across hospitals and clinics\nScalable platform that grows with HonorHealth's expanding network\nKEY TALKING POINTS FOR THE MEETING\nBoth LMD and TMS interest + C-Suite = strong buying signal\nRegional health system = faster buying cycle than mega-systems\nPhoenix metro geography is well-suited for route optimization ROI\nLocus can serve as a proof-of-concept that scales to larger health systems", "PSA BDP": "PSA BDP\n3PL / Freight Forwarding  |  Revenue: ~$3-5B (est.)  |  Locus Score: 75/100  |  Rank #13\nSUPPLY CHAIN CONTEXT\nPSA BDP is a major global freight forwarder and 3PL with significant healthcare and pharmaceutical logistics expertise. They serve as a logistics service provider for pharma manufacturers and health systems, managing temperature-controlled shipments globally. As a 3PL, they are both a potential customer and a channel partner.\nKEY PAIN POINTS\nDifferentiating 3PL service with technology-driven last function renderStats() {
  const companies = fullData.companies;
  const lmdCount = companies.filter(c => c.interested_in_lmd).length;
  const tmsCount = companies.filter(c => c.interested_in_tms).length;
  const top20 = companies.filter(c => c.locus_score >= 66).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="stat-chip"><strong>${companies.length}</strong>Companies Profiled</div>
    <div class="stat-chip"><strong>${lmdCount}</strong>LMD Interest</div>
    <div class="stat-chip"><strong>${tmsCount}</strong>TMS Interest</div>
    <div class="stat-chip"><strong>${top20}</strong>Score >= 66</div>
    <div class="stat-chip"><strong>${Object.keys(twoPagers).length}</strong>Deep 2-Pagers</div>
  `;
}

function getScoreClass(score) {
  if (score >= 80) return 'score-hot';
  if (score >= 60) return 'score-warm';
  return 'score-cool';
}

      if (!searchStr.includes(query)) return false;

function hasTwoPager(company) {
  return Object.keys(twoPagers).some(k =>
    k.toLowerCase().includes(company.toLowerCase().split(' ')[0]) ||
    company.toLowerCase().includes(k.toLowerCase().split(' ')[0])
  );
}

function getTwoPager(company) {
  const key = Object.keys(twoPagers).find(k =>
    k.toLowerCase().includes(company.toLowerCase().split(' ')[0]) ||
    company.toLowerCase().includes(k.toLowerCase().split(' ')[0])
  );
  return key ? twoPagers[key] : null;
}

    company.toLowerCase().includes(a.company.toLowerCase().split(' ')[0]) ||
    a.company.toLowerCase().includes(company.toLowerCase().split(' ')[0])
  );
}

const RESEARCH_CONTENT = `
<h2>1. THE LANDSCAPE: US Pharma & Medical Device Supply Chain</h2>

<h3>End-to-End Supply Chain Flows</h3>
<p><strong>Pharmaceutical:</strong> Manufacturer → Wholesale Distributor (McKesson ~$300B, Cardinal Health ~$200B, AmerisourceBergen ~$240B) → Pharmacy/Hospital → Patient. These "Big 3" control ~92% of US pharma distribution. Specialty pharma adds complexity: manufacturer → specialty distributor → specialty pharmacy → patient (often cold chain, $50K+ therapies).</p>

<p><strong>Medical Devices:</strong> More fragmented. Multiple paths exist simultaneously:</p>
<ul>
  <li><strong>Standard distribution:</strong> Manufacturer → Distributor (Medline $21B, Owens & Minor $10B, Henry Schein $12B) → Hospital/Clinic</li>
  <li><strong>Direct-to-hospital:</strong> Manufacturer → Hospital (for high-value devices, custom implants)</li>
  <li><strong>Field service:</strong> Manufacturer → Field rep trunk stock → Hospital OR (surgical kits, loaner inventory)</li>
  <li><strong>Consignment:</strong> Manufacturer-owned inventory sitting at hospital, billed on use</li>
  <li><strong>Home delivery:</strong> Manufacturer/Distributor → Patient home (DME, diabetes supplies, home diagnostics)</li>
</ul>

<p><strong>GPO Layer:</strong> Group Purchasing Organizations (Vizient ~$140B purchasing volume, Premier ~$84B, HealthTrust, Intalere) negotiate contracts but don't handle logistics. They set pricing; distributors handle fulfillment. ~96% of US hospitals use at least one GPO.</p>

<h3>Field Service Supply Chain — The Unique MedTech Challenge</h3>
<p>This is the #1 differentiator from pharma/retail logistics and the most relevant to LogiMed attendees:</p>

<table>
  <tr><th>Concept</th><th>What It Is</th><th>Pain Point</th></tr>
  <tr><td><strong>Loaner Kits</strong></td><td>Manufacturer-owned surgical instrument sets (~$50K-$500K each) loaned to hospitals for specific surgeries, then returned</td><td>Circular logistics: outbound delivery → surgery → sterilization → return → reprocessing → next case. Each kit may serve 3-5 hospitals/week</td></tr>
  <tr><td><strong>Consignment Inventory</strong></td><td>Manufacturer-owned implants/devices stored at hospital, billed only when used</td><td>$billions in working capital tied up; poor visibility; expired stock; manual counting</td></tr>
  <tr><td><strong>Surgical Trays</strong></td><td>Pre-assembled instrument sets for specific procedures (knee replacement, spinal fusion)</td><td>Missing instruments discovered only in OR; wrong tray delivered; sterilization delays</td></tr>
  <tr><td><strong>Trunk Stock</strong></td><td>Field reps carry high-value inventory in their vehicles for urgent cases</td><td>No real-time visibility; reps as unmanaged "warehouses"; compliance risk</td></tr>
  <tr><td><strong>Implants</strong></td><td>Patient-specific or size-specific components that must match the surgical plan</td><td>Wrong size = cancelled surgery; expiration tracking; UDI compliance</td></tr>
</table>

<p><strong>A typical surgical case flow:</strong> Surgeon schedules case (2-14 days out) → Hospital procurement sends PO → Manufacturer assigns loaner kit → Kit shipped or driven to hospital (often same-day/next-day) → Hospital SPD receives, inspects, sterilizes → Kit available for surgery → Post-surgery: used implants billed, unused returned → Kit returned to manufacturer → Reprocessing/replenishment → Next case. <em>This entire cycle must be tracked with chain-of-custody documentation.</em></p>

<h3>Top 10 Supply Chain Pain Points (2025-2026)</h3>
<ol>
  <li><strong>Multi-path delivery coordination:</strong> 5-7 simultaneous delivery paths, each with different rules, no single decision layer</li>
  <li><strong>Goods + field service disconnection:</strong> TMS handles goods, FSM handles technicians — nobody handles the intersection</li>
  <li><strong>Loaner kit logistics chaos:</strong> 15-30% of surgical kits arrive late or incomplete (industry estimate). Each delay = potential cancelled surgery ($15K-$100K revenue impact)</li>
  <li><strong>Consignment inventory black hole:</strong> $billions in manufacturer inventory at hospitals with no real-time visibility. Medtronic alone estimated at $2B+ in field inventory</li>
  <li><strong>Cold chain compliance:</strong> Biologics, certain devices require 2-8°C continuous monitoring. Any excursion = product loss + regulatory risk</li>
  <li><strong>DSCSA compliance burden:</strong> Full serialization mandate. Small dispensers deadline Nov 2026. Non-compliance: up to $500K/violation</li>
  <li><strong>Tariff and reshoring disruption:</strong> Abbott absorbing "few hundred million" in tariff costs. Supply chains being restructured</li>
  <li><strong>Cargo theft escalation:</strong> Healthcare is high-value target. Organized rings using identity spoofing. $15-30B annual US cargo theft</li>
  <li><strong>Manual disruption response:</strong> When a constraint changes (courier delay, weather, carrier unavailability), response is phone calls + spreadsheets</li>
  <li><strong>Audit trail gaps:</strong> Manual status overrides create compliance risk. Audit prep takes 2-4 weeks instead of minutes</li>
</ol>

<h3>Regulatory Constraints</h3>
<table>
  <tr><th>Regulation</th><th>What It Requires</th><th>Logistics Impact</th></tr>
  <tr><td>FDA 21 CFR Part 820</td><td>Quality system regulation for devices</td><td>Traceability from manufacturing to patient</td></tr>
  <tr><td>DSCSA</td><td>Drug serialization + traceability</td><td>Package-level tracking, transaction history at every handoff</td></tr>
  <tr><td>UDI</td><td>Unique Device Identification on all devices</td><td>Barcode scanning at every logistics touchpoint</td></tr>
